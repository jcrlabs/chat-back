---
# Copy this file, fill in real values, and apply ONCE (never commit with real values):
#   cp coturn-secret.example.yaml coturn-secret.yaml
#   # edit coturn-secret.yaml with base64-encoded values
#   kubectl apply -f coturn-secret.yaml
#
# To base64-encode: echo -n "myvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: coturn-creds
  namespace: chat
type: Opaque
data:
  username: <base64-encoded-username>
  credential: <base64-encoded-password>
