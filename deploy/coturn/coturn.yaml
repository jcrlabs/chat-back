---
# TURN credentials — apply separately with real values:
#   kubectl create secret generic coturn-creds \
#     --from-literal=username=<user> \
#     --from-literal=credential=<pass> \
#     -n chat
# See coturn-secret.example.yaml for the manifest form.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: chat
data:
  turnserver.conf: |
    listening-port=3478
    tls-listening-port=5349
    realm=chat.jcrlabs.net
    server-name=coturn.chat.jcrlabs.net
    lt-cred-mech
    log-file=/dev/stdout
    no-stdout-log=false
    fingerprint
    no-loopback-peers
    no-multicast-peers
    mobility
    no-cli
  # credentials are injected via env vars TURN_USERNAME / TURN_CREDENTIAL
  # and written to userdb at startup by the init script
  init.sh: |
    #!/bin/sh
    echo "${TURN_USERNAME}:${TURN_CREDENTIAL}" > /etc/coturn/users.txt
    exec turnserver -c /etc/coturn/turnserver.conf --userdb /etc/coturn/users.txt "$@"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: chat
  labels:
    app: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      containers:
        - name: coturn
          image: coturn/coturn:4.6.3
          command: ["/bin/sh", "/etc/coturn/init.sh"]
          env:
            - name: TURN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: coturn-creds
                  key: username
            - name: TURN_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: coturn-creds
                  key: credential
          ports:
            - name: turn-udp
              containerPort: 3478
              protocol: UDP
            - name: turn-tcp
              containerPort: 3478
              protocol: TCP
            - name: turns-tcp
              containerPort: 5349
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/coturn
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: coturn-config
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: coturn
  namespace: chat
spec:
  selector:
    app: coturn
  type: LoadBalancer
  ports:
    - name: turn-udp
      port: 3478
      targetPort: 3478
      protocol: UDP
    - name: turn-tcp
      port: 3478
      targetPort: 3478
      protocol: TCP
    - name: turns-tcp
      port: 5349
      targetPort: 5349
      protocol: TCP
